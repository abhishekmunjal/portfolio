<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0e14;--bg2:#151a21;--surface:#1a1f29;
  --green:#00ff41;--green2:#39ff14;--cyan:#00ffff;--blue:#4da6ff;
  --yellow:#ffeb3b;--red:#ff5555;--orange:#ff9800;--purple:#c792ea;
  --text:#b3b9c5;--text2:#6b7280;--white:#e6e8eb;
  --mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--mono);font-size:15px;
  display:flex;flex-direction:column;
}

/* Terminal Window */
.terminal-window{
  display:flex;flex-direction:column;
  height:100%;background:var(--bg);
  position:relative;
}
.terminal-header{
  background:var(--surface);
  padding:0.5rem 1rem;
  display:flex;align-items:center;
  justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;
}
.window-controls{display:flex;gap:0.5rem;}
.window-btn{width:12px;height:12px;border-radius:50%;}
.btn-red{background:#ff5f56;}
.btn-yellow{background:#ffbd2e;}
.btn-green{background:#27c93f;}
.window-title{
  font-size:0.8rem;color:var(--text2);
  position:absolute;left:50%;transform:translateX(-50%);
}

/* Terminal Content */
.terminal-content{
  flex:1;
  overflow-y:auto;
  padding:1.5rem;
  display:flex;flex-direction:column;
  scrollbar-width:thin;
  scrollbar-color:var(--surface) var(--bg);
}
.terminal-content::-webkit-scrollbar{width:8px;}
.terminal-content::-webkit-scrollbar-track{background:var(--bg);}
.terminal-content::-webkit-scrollbar-thumb{background:var(--surface);border-radius:4px;}

/* Boot Sequence */
.boot-line{
  font-size:0.85rem;
  color:var(--text2);
  margin:0.15rem 0;
  opacity:0;
  animation:fadeIn 0.3s forwards;
}
@keyframes fadeIn{to{opacity:1;}}

/* Welcome ASCII Art */
.ascii-art{
  color:var(--green);
  font-size:0.7rem;
  line-height:1.2;
  margin:1rem 0;
  white-space:pre;
  animation:glitch 3s infinite;
}
@keyframes glitch{
  0%,100%{text-shadow:0 0 0;}
  10%{text-shadow:1px 0 var(--cyan),-1px 0 var(--red);}
  20%{text-shadow:0 0 0;}
}

/* Output Lines */
.output{margin:0.5rem 0;}
.output.success{color:var(--green);}
.output.error{color:var(--red);}
.output.info{color:var(--cyan);}
.output.warning{color:var(--yellow);}

.prompt{
  display:flex;align-items:flex-start;gap:0.5rem;
  margin:1rem 0 0.5rem;
}
.prompt-symbol{color:var(--green);flex-shrink:0;}
.prompt-path{color:var(--blue);flex-shrink:0;}
.prompt-input{
  flex:1;background:none;border:none;
  color:var(--white);font-family:var(--mono);font-size:15px;
  outline:none;caret-color:var(--green);
}

.cursor-blink{
  display:inline-block;
  width:8px;height:1.2em;
  background:var(--green);
  margin-left:2px;
  animation:blink 1s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* Command Output Styles */
.section-header{
  color:var(--green);
  font-weight:600;
  margin:1rem 0 0.5rem;
  border-bottom:1px solid var(--green);
  padding-bottom:0.3rem;
}
.section-content{margin-left:1rem;}

.experience-item{
  margin:0.75rem 0;
  padding:0.5rem;
  background:rgba(255,255,255,0.02);
  border-left:2px solid var(--cyan);
  padding-left:1rem;
}
.exp-title{color:var(--yellow);font-weight:600;}
.exp-company{color:var(--purple);font-size:0.9rem;}
.exp-desc{color:var(--text);font-size:0.85rem;margin-top:0.3rem;line-height:1.6;}

.project-item{
  margin:0.75rem 0;
  padding:0.5rem;
  background:rgba(255,255,255,0.02);
  border-left:2px solid var(--blue);
  padding-left:1rem;
}
.project-name{color:var(--cyan);font-weight:600;}
.project-link{color:var(--green);font-size:0.85rem;text-decoration:none;}
.project-link:hover{text-decoration:underline;}
.project-desc{color:var(--text);font-size:0.85rem;margin-top:0.3rem;line-height:1.6;}

.skill-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:0.75rem;margin:0.5rem 0;
}
.skill-category{
  background:rgba(255,255,255,0.03);
  padding:0.75rem;
  border:1px solid rgba(255,255,255,0.05);
}
.skill-cat-name{color:var(--orange);font-weight:600;margin-bottom:0.3rem;font-size:0.9rem;}
.skill-list{list-style:none;padding:0;}
.skill-list li{
  color:var(--text);font-size:0.85rem;
  padding:0.2rem 0;
  padding-left:1rem;position:relative;
}
.skill-list li::before{
  content:'▸';
  position:absolute;left:0;color:var(--green);
}

.help-table{width:100%;border-collapse:collapse;margin:0.5rem 0;}
.help-table td{padding:0.3rem 1rem 0.3rem 0;font-size:0.9rem;}
.help-table td:first-child{color:var(--cyan);font-weight:600;min-width:150px;}
.help-table td:last-child{color:var(--text2);}

.tree-view{font-size:0.85rem;line-height:1.8;}
.tree-item{color:var(--text);padding-left:1rem;position:relative;}
.tree-item::before{content:'├── ';color:var(--text2);position:absolute;left:0;}
.tree-item:last-child::before{content:'└── ';}
.tree-file{color:var(--green);}
.tree-dir{color:var(--blue);font-weight:600;}

.loading{
  display:inline-block;
  animation:dots 1.5s steps(3,end) infinite;
}
@keyframes dots{
  0%{content:'.';}
  33%{content:'..';}
  66%{content:'...';}
}

.matrix-rain{
  position:fixed;inset:0;
  pointer-events:none;
  opacity:0.03;
  z-index:0;
}
.matrix-rain canvas{display:block;width:100%;height:100%;}

.suggestion{
  color:var(--text2);
  font-style:italic;
  font-size:0.85rem;
  margin-top:0.3rem;
}

/* Mobile */
@media(max-width:768px){
  .terminal-content{padding:1rem;font-size:14px;}
  .skill-grid{grid-template-columns:1fr;}
}

/* Command not found */
.not-found{
  color:var(--red);
  font-size:0.9rem;
}
</style>

  });
}

function createPrompt() {
  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.innerHTML = `
    <span class="prompt-symbol">┌──(</span>
    <span class="prompt-path">abhishek㉿portfolio</span>
    <span class="prompt-symbol">)-[</span>
    <span class="prompt-path">~</span>
    <span class="prompt-symbol">]</span><br>
    <span class="prompt-symbol">└─$</span>
    <input type="text" class="prompt-input" id="commandInput" autocomplete="off" spellcheck="false" autofocus>
  `;
  output.appendChild(prompt);
  
  const input = document.getElementById('commandInput');
  input.focus();
  
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const cmd = input.value.trim().toLowerCase();
      if (cmd) {
        commandHistory.push(cmd);
        historyIndex = commandHistory.length;
        handleCommand(cmd);
      }
      input.value = '';
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (historyIndex > 0) {
        historyIndex--;
        input.value = commandHistory[historyIndex];
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (historyIndex < commandHistory.length - 1) {
        historyIndex++;
        input.value = commandHistory[historyIndex];
      } else {
        historyIndex = commandHistory.length;
        input.value = '';
      }
    }
  });
  
  output.scrollTop = output.scrollHeight;
}

function handleCommand(cmd) {
  // Remove input
  const lastPrompt = output.querySelector('.prompt:last-child');
  const displayCmd = document.createElement('div');
  displayCmd.innerHTML = `<span style="color:var(--green);">┌──(</span><span style="color:var(--blue);">abhishek㉿portfolio</span><span style="color:var(--green);">)-[</span><span style="color:var(--blue);">~</span><span style="color:var(--green);">]</span><br><span style="color:var(--green);">└─$</span> <span style="color:var(--white);">${cmd}</span>`;
  output.replaceChild(displayCmd, lastPrompt);

  // Special commands
  if (cmd === 'clear' || cmd === 'cls') {
    output.innerHTML = '';
    createPrompt();
    return;
  }

  if (cmd === 'sudo rm -rf /') {
    const joke = document.createElement('div');
    joke.className = 'output error';
    joke.innerHTML = `<span style="color:var(--red);">😱 Nice try! But this portfolio is staying alive.</span><br><span style="color:var(--text2);">rm: cannot remove '/': Permission denied (and you know why)</span>`;
    output.appendChild(joke);
    createPrompt();
    return;
  }

  if (cmd === 'matrix') {
    toggleMatrix();
    const msg = document.createElement('div');
    msg.className = 'output success';
    msg.textContent = 'Matrix effect toggled.';
    output.appendChild(msg);
    createPrompt();
    return;
  }

  // Standard commands
  if (commands[cmd]) {
    if (commands[cmd] === 'CLEAR') {
      output.innerHTML = '';
    } else {
      const result = document.createElement('div');
      result.className = 'output';
      result.innerHTML = commands[cmd];
      output.appendChild(result);
    }
  } else {
    const error = document.createElement('div');
    error.className = 'output not-found';
    error.innerHTML = `bash: ${cmd}: command not found<br><span class="suggestion">Type 'help' to see available commands.</span>`;
    output.appendChild(error);
  }

  createPrompt();
}

// Matrix rain effect
let matrixInterval;
function initMatrix() {
  const canvas = document.createElement('canvas');
  const matrix = document.getElementById('matrix');
  matrix.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  const fontSize = 14;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);
  
  function draw() {
    ctx.fillStyle = 'rgba(10, 14, 20, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = fontSize + 'px monospace';
    
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      
      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }
  
  matrixInterval = setInterval(draw, 50);
}

function toggleMatrix() {
  const matrix = document.getElementById('matrix');
  if (matrix.style.opacity === '0.03') {
    matrix.style.opacity = '0';
  } else {
    matrix.style.opacity = '0.03';
  }
}

// Initialize
window.addEventListener('load', () => {
  initMatrix();
  bootSequence();
